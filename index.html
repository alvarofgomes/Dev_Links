<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
    <title>Links | Alvaro Gomes</title>

    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            const preferLight = window.matchMedia('(prefers-color-scheme: light)').matches;
            if (saved === 'light' || (!saved && preferLight)) {
                document.documentElement.classList.add('light');
            }
        })();
    </script>
</head>

<body>
    <div class="container">
        <div class="profile">
            <img id="avatar" src="./assets/Avatar.png" alt="Foto de perfil de Alvaro Gomes">
            <p>Alvaro Gomes</p>
        </div>

        <div class="switch">
            <button id="toggle-btn" aria-label="Alternar para modo claro" aria-pressed="false"></button>
            <span aria-hidden="true"></span>
        </div>

        <ul>
            <li><a href="https://alvarofgomes.github.io/Portfolio_Alvaro_Gomes-/" target="_blank" rel="noopener noreferrer">Veja meu Portfólio</a></li>

            </a>
            <a href="https://www.linkedin.com/in/alvarofgomes/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn de Alvaro Gomes">

        </footer>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="./script.js"></script>
