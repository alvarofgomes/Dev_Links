<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Links e redes sociais de Alvaro Gomes — desenvolvedor back-end. Acesse meu portfólio, certificados e perfis profissionais.">
    <meta name="author" content="Alvaro Gomes">

    <meta property="og:title" content="Links | Alvaro Gomes">
    <meta property="og:description" content="Desenvolvedor back-end. Acesse meu portfólio, certificados e redes sociais.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="./assets/Avatar.png">

    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap">

    <link rel="stylesheet" href="style.css">
    <title>Links | Alvaro Gomes</title>

    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            const preferLight = window.matchMedia('(prefers-color-scheme: light)').matches;
            if (saved === 'light' || (!saved && preferLight)) {
                document.documentElement.classList.add('light');
            }
        })();
    </script>
</head>

<body>
    <div class="bg-glow"></div>
    <canvas id="bg-canvas"></canvas>

    <main class="container">
        <div class="profile">
            <div class="avatar-ring">
                <img id="avatar" src="./assets/Avatar.png" alt="Foto de perfil de Alvaro Gomes">
            </div>
            <div class="name">Alvaro Gomes</div>
            <div class="handle">@alvarofgomes</div>
            <div class="status"><span class="pulse"></span> Desenvolvedor Back-end · Recife, BR</div>
        </div>

        <div class="switch" role="group" aria-label="Alternar tema">
            <button id="btn-dark" class="active" aria-pressed="true">
                <ion-icon name="moon"></ion-icon> Escuro
            </button>
            <button id="btn-light" aria-pressed="false">
                <ion-icon name="sunny"></ion-icon> Claro
            </button>
        </div>

        <ul class="links">
            <li>
                <a href="https://alvarofgomes.github.io/Portfolio_alvarofgomes/" target="_blank" rel="noopener noreferrer">
                    <span class="ico"><ion-icon name="code-slash"></ion-icon></span>
                    <span class="txt">
                        <span class="label">Veja meu Portfólio</span>
                        <span class="desc">projetos, experiência e mais</span>
                    </span>
                    <ion-icon class="arrow" name="arrow-forward"></ion-icon>
                </a>
            </li>
            <li>
                <a href="https://github.com/alvarofgomes/Certificados" target="_blank" rel="noopener noreferrer">
                    <span class="ico"><ion-icon name="ribbon"></ion-icon></span>
                    <span class="txt">
                        <span class="label">Certificados</span>
                        <span class="desc">cursos, bootcamps e formações</span>
                    </span>
                    <ion-icon class="arrow" name="arrow-forward"></ion-icon>
                </a>
            </li>
            <li>
                <a href="https://www.linkedin.com/in/alvarofgomes/" target="_blank" rel="noopener noreferrer">
                    <span class="ico"><ion-icon name="logo-linkedin"></ion-icon></span>
                    <span class="txt">
                        <span class="label">LinkedIn</span>
                        <span class="desc">trajetória profissional</span>
                    </span>
                    <ion-icon class="arrow" name="arrow-forward"></ion-icon>
                </a>
            </li>
        </ul>

        <div class="social">
            <a href="https://github.com/alvarofgomes" target="_blank" rel="noopener noreferrer" aria-label="GitHub de Alvaro Gomes">
                <ion-icon name="logo-github" aria-hidden="true"></ion-icon>
            </a>
            <a href="https://www.linkedin.com/in/alvarofgomes/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn de Alvaro Gomes">
                <ion-icon name="logo-linkedin" aria-hidden="true"></ion-icon>
            </a>
            <a href="https://www.instagram.com/_alvarogomes_/" target="_blank" rel="noopener noreferrer" aria-label="Instagram de Alvaro Gomes">
                <ion-icon name="logo-instagram" aria-hidden="true"></ion-icon>
            </a>
        </div>

        <footer>
            <span class="prompt">$</span> desenvolvido por <a href="https://www.linkedin.com/in/alvarofgomes/" target="_blank" rel="noopener noreferrer">Alvaro Gomes</a>
        </footer>
    </main>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="./script.js"></script>
</body>

</html>
